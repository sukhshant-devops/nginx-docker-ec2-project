name: Deploy Nginx App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: "54.92.199.109"   # temporary direct test
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "nginx-docker-ec2-project" ]; then
              git clone https://github.com/sukhshant-devops/nginx-docker-ec2-project.git
            fi
            cd nginx-docker-ec2-project
            git pull
            docker-compose down
            docker-compose up -d
